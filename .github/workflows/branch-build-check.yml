name: Branch Build Check

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  fast-build-check:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Validate WheelOverlay property test directives
      run: |
        .\scripts\Validate-PropertyTests.ps1 -TestProjectPath tests/WheelOverlay.Tests
      shell: pwsh

    - name: Validate OverlayCore property test directives
      run: |
        .\scripts\Validate-PropertyTests.ps1 -TestProjectPath tests/OverlayCore.Tests
      shell: pwsh

    - name: Build
      run: |
        Write-Host "Building project..."
        dotnet build --no-restore --configuration FastTests src/WheelOverlay/WheelOverlay.csproj
      shell: pwsh

    - name: Run Fast Tests (10 iterations)
      run: |
        Write-Host "Running fast test suite with 10 iterations per property test..."
        dotnet test --no-build --verbosity normal --configuration FastTests
        Write-Host "Fast tests passed - branch is buildable"
      shell: pwsh
